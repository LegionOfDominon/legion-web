<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Legion Web</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #4df3e0, #6a9cff);
    color: white;
    text-align: center;
}

.container {
    max-width: 900px;
    margin: 50px auto;
    padding: 30px;
    border-radius: 20px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
}

.file {
    margin-top: 20px;
    padding: 15px;
    background: rgba(0,0,0,0.2);
    border-radius: 15px;
}
</style>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

</head>

<body>

<div class="container">
    <h1>LEGION WEB</h1>

    <p>Welcome to Legion Web. Legion Web Is A Free To Use Online Website That Provides Many Code Lessons, Videos, Notes And ETC In One Place!<br><br>
    Disclaimer: This Website Has Resources Of Some Other Creators And Sources. All Credits Goes To Their Respective Owner!!!</p>

    <h2>📂 Files</h2>
    <div id="fileDisplay"></div>
</div>

<script>
// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAVwgEK8uQAcqvoTmU07PYYX0FmIHEbh9Q",
  authDomain: "legion-web-816a0.firebaseapp.com",
  projectId: "legion-web-816a0",
  storageBucket: "legion-web-816a0.firebasestorage.app",
  messagingSenderId: "939596002450",
  appId: "1:939596002450:web:64da3ff4550553581f224b",
  measurementId: "G-CKJTZ0EKMB"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// LOAD FILES FOR USERS
window.onload = function() {
    let container = document.getElementById("fileDisplay");
    container.innerHTML = "Loading...";

    db.collection("files").get().then(snapshot => {
        container.innerHTML = "";

        if (snapshot.empty) {
            container.innerHTML = "No files uploaded yet.";
            return;
        }

        snapshot.forEach(doc => {
            let data = doc.data();

            let div = document.createElement("div");
            div.className = "file";

            div.innerHTML = `
                <h3>${data.name}</h3>
                <a href="${data.url}" target="_blank">Open File</a>
            `;

            container.appendChild(div);
        });
    });
};
</script>

</body>
</html>
