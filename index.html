<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Legion Web</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #4df3e0, #6a9cff);
    color: white;
    text-align: center;
}

.container {
    max-width: 900px;
    margin: 50px auto;
    padding: 30px;
    border-radius: 20px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
}

/* FLEX FOR TEXT + LOGO */
.typing-container {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 15px;
}

/* NEON TEXT */
#typing-text {
    font-size: 18px;
    text-shadow: 
        0 0 5px #00fff7,
        0 0 10px #00fff7,
        0 0 20px #00fff7,
        0 0 40px #00fff7;
}

/* Cursor */
#typing-text::after {
    content: "|";
    animation: blink 0.7s infinite;
}

@keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
}

/* COMPUTER LOGO (CSS SHAPE) */
.logo {
    width: 40px;
    height: 30px;
    border: 3px solid #00fff7;
    border-radius: 5px;
    position: relative;
    box-shadow: 0 0 10px #00fff7;
    animation: spin 3s linear infinite;
}

/* Screen stand */
.logo::after {
    content: "";
    position: absolute;
    bottom: -8px;
    left: 10px;
    width: 15px;
    height: 5px;
    background: #00fff7;
    border-radius: 2px;
}

/* SPIN ANIMATION */
@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

.file {
    margin-top: 20px;
    padding: 15px;
    background: rgba(0,0,0,0.2);
    border-radius: 15px;
    transition: 0.3s;
}

.file:hover {
    transform: scale(1.03);
}
</style>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

</head>

<body>

<div class="container">
    <h1>LEGION WEB</h1>

    <div class="typing-container">
        <p id="typing-text"></p>
        <div class="logo"></div>
    </div>

    <p style="font-size: 0.85em; opacity: 0.8;">
    Disclaimer: This Website Has Resources Of Some Other Creators And Sources. All Credits Goes To Their Respective Owner!!!
    </p>

    <h2>📂 Files</h2>
    <div id="fileDisplay"></div>
</div>

<script>
// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAVwgEK8uQAcqvoTmU07PYYX0FmIHEbh9Q",
  authDomain: "legion-web-816a0.firebaseapp.com",
  projectId: "legion-web-816a0",
  storageBucket: "legion-web-816a0.firebasestorage.app",
  messagingSenderId: "939596002450",
  appId: "1:939596002450:web:64da3ff4550553581f224b",
  measurementId: "G-CKJTZ0EKMB"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// LOOP TYPING
const text = "Welcome to Legion Web. Legion Web Is A Free To Use Online Website That Provides Many Code Lessons, Videos, Notes And ETC In One Place!";

function startTypingLoop() {
    const el = document.getElementById("typing-text");
    let index = 0;

    function type() {
        if (index < text.length) {
            el.textContent += text.charAt(index);
            index++;
            setTimeout(type, 40);
        } else {
            setTimeout(() => {
                el.textContent = "";
                index = 0;
                type();
            }, 2000);
        }
    }

    type();
}

// LOAD
document.addEventListener("DOMContentLoaded", function() {

    startTypingLoop();

    let container = document.getElementById("fileDisplay");
    container.innerHTML = "Loading...";

    db.collection("files").get().then(snapshot => {
        container.innerHTML = "";

        if (snapshot.empty) {
            container.innerHTML = "No files uploaded yet.";
            return;
        }

        snapshot.forEach(doc => {
            let data = doc.data();
            if (!data.name || !data.url) return;

            let div = document.createElement("div");
            div.className = "file";

            div.innerHTML = `
                <h3>${data.name}</h3>
                ${
                    data.url.includes("mp4") 
                    ? `<video width="100%" controls src="${data.url}"></video>` 
                    : `<a href="${data.url}" target="_blank" style="color: #fff; font-weight: bold;">Open File</a>`
                }
            `;

            container.appendChild(div);
        });
    });

});
</script>

</body>
</html>
