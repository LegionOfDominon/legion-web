<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    text-align: center;
}

.container {
    margin-top: 50px;
}

input {
    padding: 10px;
    margin: 10px;
    width: 250px;
    border-radius: 10px;
    border: none;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    background: #00ffcc;
    cursor: pointer;
}

.file {
    margin-top: 20px;
    background: #222;
    padding: 10px;
    border-radius: 10px;
}
</style>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

</head>

<body>

<div class="container">
    <h1>ADMIN PANEL</h1>

    <input type="text" id="fileName" placeholder="File Name">
    <input type="text" id="fileURL" placeholder="Paste File Link">
    <br>
    <button onclick="addFile()">Add File</button>

    <h2>Uploaded Files</h2>
    <div id="fileList"></div>
</div>

<script>
// YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAVwgEK8uQAcqvoTmU07PYYX0FmIHEbh9Q",
  authDomain: "legion-web-816a0.firebaseapp.com",
  projectId: "legion-web-816a0",
  storageBucket: "legion-web-816a0.firebasestorage.app",
  messagingSenderId: "939596002450",
  appId: "1:939596002450:web:64da3ff4550553581f224b",
  measurementId: "G-CKJTZ0EKMB"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ADD FILE
function addFile() {
    let name = document.getElementById("fileName").value;
    let url = document.getElementById("fileURL").value;

    if (!name || !url) {
        alert("Fill all fields");
        return;
    }

    db.collection("files").add({
        name: name,
        url: url
    }).then(() => {
        alert("Added!");
        loadFiles();
    });
}

// LOAD FILES
function loadFiles() {
    let container = document.getElementById("fileList");
    container.innerHTML = "";

    db.collection("files").get().then(snapshot => {
        snapshot.forEach(doc => {
            let data = doc.data();

            let div = document.createElement("div");
            div.className = "file";

            div.innerHTML = `
                <p>${data.name}</p>
                <a href="${data.url}" target="_blank">Open</a>
                <br><br>
                <button onclick="deleteFile('${doc.id}')">Delete</button>
            `;

            container.appendChild(div);
        });
    });
}

// DELETE FILE
function deleteFile(id) {
    db.collection("files").doc(id).delete().then(() => {
        loadFiles();
    });
}

// LOAD ON START
window.onload = loadFiles;
</script>

</body>
</html>
